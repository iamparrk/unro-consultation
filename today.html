function getToday() {
  const now = new Date();
  const kst = new Date(now.getTime() + 9*60*60*1000);
  return { month: kst.getUTCMonth()+1, day: kst.getUTCDate() };
}

function findDateIndex(month, day) {
  return dates.findIndex(d => {
    const m = parseInt(d.date.split('월')[0]);
    const dd = parseInt(d.date.split('월')[1].replace('일','').trim());
    return m === month && dd === day;
  });
}

function renderCard(index) {
  const area = document.getElementById('card-area');
  const display = document.getElementById('date-display');
  document.getElementById('prev-btn').disabled = index <= 0;
  document.getElementById('next-btn').disabled = index >= dates.length-1;

  if (index < 0 || index >= dates.length) {
    area.innerHTML = '<div class="no-data">해당 날짜의 운세 데이터가 없어요.<br>매월 업데이트됩니다.</div>';
    display.textContent = '준비 중';
    return;
  }

  const d = dates[index];
  display.textContent = d.date + ' ' + d.weekday;
  const daygan = d.ilju[0];
  const noteHtml = d.note ? `<span style="color:#c0392b;font-size:11px;margin-left:6px;">· ${d.note}</span>` : '';

  const rows = ilgans.map(ig => {
    const f = getDayFortune(ig, d.ilju);
    const ss = getSipsong(ig, daygan);
    return `<div class="ilgan-card">
      <div class="ilgan-symbol">${ig}</div>
      <div class="ilgan-content">
        <div class="ilgan-name">${ilganNames[ig]} · 오늘 ${ss}</div>
        <div class="ilgan-desc">${f.desc}</div>
        <div class="ilgan-tip">${f.tip}</div>
      </div>
    </div>`;
  }).join('');

  area.innerHTML = `<div class="card">
    <div class="watermark">運</div>
    <div class="card-inner">
      <div class="card-header">
        <div style="display:flex;align-items:center;gap:8px;">
          <div class="logo-box">運</div>
          <div class="logo-text">운로</div>
        </div>
        <div class="date-area">
          <div class="date-main">${d.date} ${d.weekday}${noteHtml}</div>
          <div class="date-ilgan">음력 ${d.lunar} · 일진 ${d.ilju}</div>
        </div>
      </div>
      <div class="divider"></div>
      <div class="card-title">
        <div class="card-title-main">오늘 내 일간은 어떤 날일까? — 일간별 하루 운세</div>
        <div class="card-title-sub">MY DAILY FORTUNE BY DAY MASTER · 2026</div>
      </div>
      <div class="ilgan-grid">${rows}</div>
      <div class="card-footer">
        <div class="footer-note">내 일간을 모른다면 사주 앱에서 일주 위 글자 확인</div>
        <div class="footer-url">www.unro.co.kr</div>
      </div>
    </div>
  </div>`;
}

function changeDay(dir) {
  currentIndex += dir;
  renderCard(currentIndex);
}

const { month, day } = getToday();
currentIndex = findDateIndex(month, day);
if (currentIndex === -1) currentIndex = 0;
renderCard(currentIndex);
</script>
</body>
